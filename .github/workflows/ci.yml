name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # 仅使用 package.json 里的 packageManager 字段指定 pnpm 版本
        # 避免与 action-setup 的 version 配置冲突（ERR_PNPM_BAD_PM_VERSION）

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: CI
        run: pnpm run check
